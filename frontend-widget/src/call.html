<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Call</title>
<!--CSS-->
</head>
<body>
<div id="root">
  <header id="header">
    <div id="title">Loading…</div>
    <button id="close" type="button" aria-label="Close call">&times;</button>
  </header>

  <main id="stage">
    <div id="avatar-wrap">
      <span id="ring-1"></span>
      <span id="ring-2"></span>
      <div id="avatar">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2l1.7 4.5 4.8.4-3.6 3.2 1 4.7L12 12.5 8.1 14.8l1-4.7L5.5 6.9l4.8-.4L12 2z"/></svg>
      </div>
    </div>

    <div id="status">Connecting…</div>

    <div id="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div id="transcript" aria-live="polite"></div>
  </main>

  <footer id="controls">
    <span id="timer">00:00</span>
    <div class="btn-group">
      <button id="mute" type="button" aria-pressed="false" aria-label="Mute microphone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button id="endcall" type="button" aria-label="End call">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7a2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11l-1.27 1.27"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
      </button>
    </div>
    <span id="spacer"></span>
  </footer>

  <div id="error" hidden></div>
  <div id="powered">Powered by SiteGenie</div>
</div>
<!--JS-->
</body>
</html>
