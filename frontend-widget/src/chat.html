<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chat</title>
<!--CSS-->
</head>
<body>
<div id="root">
  <header id="header">
    <div id="title">Loading…</div>
    <div id="header-actions">
      <button id="call" type="button" aria-label="Start voice call" title="Start voice call">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </button>
      <button id="close" type="button" aria-label="Close chat">&times;</button>
    </div>
  </header>
  <main id="messages" aria-live="polite"></main>
  <form id="composer" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Ask a question…" aria-label="Message"></textarea>
    <button id="send" type="submit" aria-label="Send message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </form>
  <div id="powered">Powered by SiteGenie</div>
</div>
<!--JS-->
</body>
</html>
