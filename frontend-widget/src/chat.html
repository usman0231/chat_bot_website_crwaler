<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chat</title>
<!--CSS-->
</head>
<body>
<div id="root">
  <header id="header">
    <div id="title">Loading…</div>
    <button id="close" type="button" aria-label="Close chat">&times;</button>
  </header>
  <main id="messages" aria-live="polite"></main>
  <form id="composer" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Ask a question…" aria-label="Message"></textarea>
    <button id="send" type="submit" aria-label="Send message">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </form>
  <div id="powered">Powered by SiteGenie</div>
</div>
<!--JS-->
</body>
</html>
