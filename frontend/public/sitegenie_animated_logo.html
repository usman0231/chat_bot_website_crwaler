<style>
@keyframes smoke1 {
  0%,100% { opacity:0.9; transform: translateY(0) scaleX(1); }
  50%      { opacity:0.5; transform: translateY(-6px) scaleX(1.2); }
}
@keyframes smoke2 {
  0%,100% { opacity:0.55; transform: translateY(0) scaleX(1); }
  50%      { opacity:0.2; transform: translateY(-8px) scaleX(0.8); }
}
@keyframes sparkle {
  0%,100% { opacity:1;   transform: scale(1);   }
  50%      { opacity:0.2; transform: scale(0.4); }
}
@keyframes lamp-glow {
  0%,100% { filter: drop-shadow(0 0 4px #a855f780); }
  50%      { filter: drop-shadow(0 0 12px #6366f1aa); }
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}
@keyframes text-shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}

.sg-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  padding: 32px 0 24px;
}

.sg-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 28px 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  width: 260px;
}

.sg-card-dark {
  background: #0f0f1a;
  border-color: #1e1e30;
}

.sg-label {
  font-size: 11px;
  color: var(--color-text-secondary);
  letter-spacing: 0.5px;
  align-self: flex-start;
}

.sg-label-dark { color: #6b7280; }

.sg-icon-wrap {
  animation: float 3s ease-in-out infinite;
}

.lamp-body { animation: lamp-glow 2.5s ease-in-out infinite; }

.smoke-main {
  animation: smoke1 2s ease-in-out infinite;
  transform-origin: 30px 21px;
}
.smoke-left {
  animation: smoke2 2.2s ease-in-out infinite 0.3s;
  transform-origin: 30px 21px;
}
.smoke-right {
  animation: smoke2 2.4s ease-in-out infinite 0.6s;
  transform-origin: 30px 21px;
}

.sp1 { animation: sparkle 1.8s ease-in-out infinite 0.0s; }
.sp2 { animation: sparkle 1.8s ease-in-out infinite 0.3s; }
.sp3 { animation: sparkle 1.8s ease-in-out infinite 0.6s; }
.sp4 { animation: sparkle 1.8s ease-in-out infinite 0.9s; }
.sp5 { animation: sparkle 1.8s ease-in-out infinite 1.2s; }

.sg-name {
  font-family: var(--font-sans);
  font-size: 26px;
  font-weight: 500;
  background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #a855f7, #6366f1);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: text-shimmer 3s linear infinite;
}

.sg-tagline {
  font-size: 12px;
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
}

.sg-tagline-dark { color: #9ca3af; }

.sg-horiz {
  display: flex;
  align-items: center;
  gap: 14px;
}

.sg-horiz-text { display: flex; flex-direction: column; gap: 4px; }

.sg-name-sm {
  font-family: var(--font-sans);
  font-size: 20px;
  font-weight: 500;
  background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #a855f7, #6366f1);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: text-shimmer 3s linear infinite;
}

.sg-cards-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.size-label {
  font-size: 11px;
  color: var(--color-text-secondary);
  text-align: center;
  margin-top: 4px;
}
</style>
